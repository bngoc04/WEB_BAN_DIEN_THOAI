<!DOCTYPE html>
<html lang="vi">

<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="footer.css?v=1.2">
    <link rel="stylesheet" href="pages.css">

                        </a>
                        <a href="cart.html" class="action-item">

                        </a>
                    </div>
                </div>
            </div>

            <div class="category-nav">
                <div class="cat-container">
                    <a href="phones.html" class="cat-item">

                    <a href="smartwatch.html" class="cat-item">
                        <i class="fas fa-microchip" style="margin-right: 8px;"></i>

                    </a>
                    <a href="watches.html" class="cat-item">
                        <i class="fas fa-clock" style="margin-right: 8px;"></i>
                        <span>Đồng hồ</span>
                    </a>
                    <a href="tablet.html" class="cat-item active">
                        <i class="fas fa-tablet-alt" style="margin-right: 8px;"></i>
                        <span>Tablet</span>
                    </a>
                </div>
            </div>

            <h2 style="margin-bottom: 2rem;">Máy tính bảng & iPad</h2>
            <div class="product-grid" id="tabletGrid">
                <!-- Data from API -->
            </div>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 TechNova. Bản quyền đã được bảo hộ.</p>
        </div>

        document.addEventListener('DOMContentLoaded', () => {
            fetchCategoryProducts('Máy tính bảng', 'tabletGrid');
        });
